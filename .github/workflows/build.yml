name: Build Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_macos:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run electron:build
        env:
          GH_TOKEN: ""

      - name: List release files
        run: ls -R release

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: HiLog日志过滤器-macOS-arm64-v1.0.0
          path: release/*.dmg
          retention-days: 30

  build_windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run electron:build
        env:
          GH_TOKEN: ""

      - name: List release files
        run: dir release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: HiLog日志过滤器-Windows-x64-v1.0.0
          path: release/*.exe
          retention-days: 30
